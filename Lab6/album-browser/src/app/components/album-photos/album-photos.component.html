<div>
  <button (click)="back()" class="text-sm text-indigo-600 hover:underline mb-6 inline-flex items-center gap-1">
    &larr; Back to Album
  </button>

  <h1 class="text-3xl font-bold text-gray-800 mb-8">Photos — Album #{{ albumId }}</h1>

  <div *ngIf="loading" class="flex items-center gap-3 text-gray-400 py-16 justify-center">
    <svg class="animate-spin h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <span class="text-sm">Loading photos...</span>
  </div>

  <div *ngIf="!loading && photos.length === 0" class="text-gray-400 text-center py-16 text-sm">
    No photos found for this album.
  </div>

  <div
    *ngIf="!loading && photos.length > 0"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"
  >
    <div
      *ngFor="let photo of photos"
      class="group relative bg-white border border-gray-200 rounded-lg overflow-hidden hover:shadow-md transition-shadow"
    >
      <img
        [src]="photo.thumbnailUrl"
        [alt]="photo.title"
        class="w-full h-24 object-cover"
        loading="lazy"
      />
      <div class="p-2">
        <p class="text-xs text-gray-500 leading-tight line-clamp-2">{{ photo.title }}</p>
      </div>
    </div>
  </div>
</div>
